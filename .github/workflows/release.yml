name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: joal-windows-x86_64
            ext: .exe
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: joal-macos-x86_64
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: joal-macos-aarch64
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p joal-app

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging
          Copy-Item "target/${{ matrix.target }}/release/joal-app${{ matrix.ext }}" staging/
          Copy-Item -Recurse resources staging/
          Compress-Archive -Path staging/* -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p staging
          cp "target/${{ matrix.target }}/release/joal-app${{ matrix.ext }}" staging/
          cp -r resources staging/
          tar -czf "${{ matrix.artifact }}.tar.gz" -C staging .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.zip
            ${{ matrix.artifact }}.tar.gz
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            joal-windows-x86_64.zip
            joal-macos-x86_64.tar.gz
            joal-macos-aarch64.tar.gz
