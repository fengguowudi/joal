name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: x86_64-pc-windows-msvc-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: x86_64-pc-windows-msvc-cargo-

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc -p joal-app

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging
          Copy-Item "target/x86_64-pc-windows-msvc/release/joal-desktop.exe" staging/
          Copy-Item -Recurse resources staging/
          Compress-Archive -Path staging/* -DestinationPath "joal-windows-x86_64.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: joal-windows-x86_64
          path: joal-windows-x86_64.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            joal-windows-x86_64.zip
