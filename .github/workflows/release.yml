name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: joal-windows-x86_64
            binary_name: joal-desktop.exe
            archive_ext: .zip

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: joal-linux-x86_64
            binary_name: joal-desktop
            archive_ext: .tar.gz

          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: joal-macos-x86_64
            binary_name: joal-desktop
            archive_ext: .tar.gz

          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: joal-macos-aarch64
            binary_name: joal-desktop
            archive_ext: .tar.gz

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libwayland-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p joal-app

      - name: Package (zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" staging/
          Copy-Item -Recurse resources staging/
          Compress-Archive -Path staging/* -DestinationPath "${{ matrix.artifact_name }}${{ matrix.archive_ext }}"

      - name: Package (tar.gz)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" staging/
          cp -r resources staging/
          tar czf "${{ matrix.artifact_name }}${{ matrix.archive_ext }}" -C staging .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}${{ matrix.archive_ext }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            joal-windows-x86_64.zip
            joal-linux-x86_64.tar.gz
            joal-macos-x86_64.tar.gz
            joal-macos-aarch64.tar.gz
